name: Multi-platform JAR & Python Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: libdark_singularity.so
            os_dir: linux
          - os: windows-latest
            artifact_name: dark_singularity.dll
            os_dir: windows
          - os: macos-latest
            artifact_name: libdark_singularity.dylib
            os_dir: macos

    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build Native Library
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            rustup target add aarch64-apple-darwin x86_64-apple-darwin
            cargo build --release --target aarch64-apple-darwin
            cargo build --release --target x86_64-apple-darwin
            mkdir -p target/artifacts
            cp target/aarch64-apple-darwin/release/${{ matrix.artifact_name }} target/artifacts/aarch64-${{ matrix.artifact_name }}
            cp target/x86_64-apple-darwin/release/${{ matrix.artifact_name }} target/artifacts/x86_64-${{ matrix.artifact_name }}
          else
            cargo build --release
            mkdir -p target/artifacts
            cp target/release/${{ matrix.artifact_name }} target/artifacts/${{ matrix.artifact_name }}
          fi
      - name: Upload Native Library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os_dir }}
          path: target/artifacts/*

  build-wheels:
    name: Build Python Wheels (${{ matrix.os }} - ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: windows-latest
            target: x64
          - os: macos-latest
            target: universal2-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            if command -v apt-get > /dev/null; then
              apt-get update && apt-get install -y libfontconfig1-dev
            elif command -v yum > /dev/null; then
              yum install -y fontconfig-devel
            fi
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-jar:
    name: Build Integrated JAR & Final Release
    needs: [build-native, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Create Native Resource Directory
        run: mkdir -p dark_singularity_api/src/main/resources/native

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Organize Artifacts for JAR
        run: |
          mkdir -p dark_singularity_api/src/main/resources/native/linux/x86_64
          mkdir -p dark_singularity_api/src/main/resources/native/windows/x86_64
          mkdir -p dark_singularity_api/src/main/resources/native/macos/x86_64
          mkdir -p dark_singularity_api/src/main/resources/native/macos/aarch64

          cp all-artifacts/native-linux/libdark_singularity.so dark_singularity_api/src/main/resources/native/linux/x86_64/
          cp all-artifacts/native-windows/dark_singularity.dll dark_singularity_api/src/main/resources/native/windows/x86_64/
          cp all-artifacts/native-macos/x86_64-libdark_singularity.dylib dark_singularity_api/src/main/resources/native/macos/x86_64/libdark_singularity.dylib
          cp all-artifacts/native-macos/aarch64-libdark_singularity.dylib dark_singularity_api/src/main/resources/native/macos/aarch64/libdark_singularity.dylib

      - name: Package JAR with Maven
        run: |
          cd dark_singularity_api
          mvn package -DskipTests -Dskip.native.build=true

      - name: Prepare Release Assets
        run: |
          mkdir -p release-dist
          cp dark_singularity_api/target/*.jar release-dist/
          # すべてのWheelファイルを1箇所に集める
          find all-artifacts -name "*.whl" -exec cp {} release-dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
